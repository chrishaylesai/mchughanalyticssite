server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Prevent nginx from issuing absolute redirects that would lose the
    # external port (e.g. 8080 → 80) when running behind Docker port mapping
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Health check endpoint
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    # Cache static assets (1 year for fingerprinted assets)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # HTML pages - short cache, always revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # Default location
    location / {
        try_files $uri $uri/index.html $uri.html =404;
        include /etc/nginx/security-headers.conf;
    }
}
