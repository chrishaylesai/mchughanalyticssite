name: Deploy Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'helm/mchughanalytics/Chart.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract appVersion from Chart.yaml
        id: chart
        run: |
          APP_VERSION=$(grep '^appVersion:' helm/mchughanalytics/Chart.yaml | sed 's/appVersion: *"\(.*\)"/\1/')
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm chart
        run: |
          helm upgrade --install mchughanalytics ./helm/mchughanalytics \
            --namespace mchughanalytics \
            --create-namespace \
            --set image.tag=${{ steps.chart.outputs.APP_VERSION }}
